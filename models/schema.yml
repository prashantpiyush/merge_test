---
version: 2
models:
- name: "mod"
  columns:
  - name: "A"
    tests:
    - unique:
        config:
          fail_calc: "count(10)"
          error_if: " > 10 "
          warn_if: " >= 0 "
          where: "B != 100 "
          severity: "error"
          store_failures: true
    dataType:
      type: "Integer"
  - name: "B"
    dataType:
      type: "Integer"
  tests: []
